# .claude/domain-config.yaml
# 产品定位配置文件 — 定义系统类型、规模、目标用户、质量属性等
# 由 /df:product-define 和 /df:product-design 两 skill 协作完成，只承载产品定位信息
# 实现细节（编程语言、架构选型、技术栈、开发规范）由 ADR 和后续阶段产出维护，不写入本文件

# 系统类型分类
system:
  # 主类型（必填）
  primary_type: "database"  # 时序数据库本质是数据库（聚焦查询语言、Schema、索引、一致性语义）

  # 子类型（可选）
  sub_type: "time-series"

  # 系统规模（必填）
  scale:
    deployment: "中等集群"  # 单客户云端最大几十节点；边端单机部署不计入集群形态判定
    data_scale: "TB级"      # 单客户几十 TB ~ 几百 TB
    concurrency:
      peak: "1k-10k"           # 云端入向所有连接合并（边节点长连接 + 应用 + 仪表盘 + 监控）
      write: "100-1k"          # 写入端并发连接数（最大客户 100 个边节点长连接）
      read: "100-1k"           # 读侧并发连接数（查询/告警/仪表盘客户端，含突发）
      read_write_ratio: "1:10" # 读请求 vs 写请求比例（写多读少的典型时序场景）
      # connection_mode 省略（peak < 10k，模板不要求追问）

  # 一句话描述（必填）
  # 综合：系统目标、核心痛点、目标用户、场景拓扑特征、部署环境、non-goals
  description: |
    边云协同的时序数据库，主场景工业 IoT 但不限于工业场景。

    核心痛点：现有时序数据库均为集中式数据中心级部署，无法支撑边云多层级架构与高效的边到云数据同步。

    部署形态：架构层面支持 N 层任意嵌套（预留能力），实际部署绝大多数为二层（边-云）。
    - 边端：单机部署（不考虑边端 HA 集群），工厂/站点本地工控机或服务器
    - 云端：中等集群（最大几十节点），承载 TB ~ 百 TB 级数据

    主要用户：终端工厂客户直接购买（IT 部门 + 业务团队共同决策）；
    日常使用者主要为「现场运维 / 数据分析师 / 应用开发者」三类；
    设备工程师不直接交互——由数据库兼容主流工业采集协议来覆盖。

    Non-Goals（明确不做的事）：
    1. 写入不强制落盘——节点故障允许丢失 30 秒数据，换取写入性能（异步刷盘策略）
    2. 不做完整 ACID 事务
    3. 不做多模融合（不存关系/文档/图，专做时序）
    4. 不做流式实时计算 / CEP 规则引擎
    5. 不做跨产品数据迁移工具
    6. 不做跨地域强一致复制（已选最终一致性）

# 质量属性（必填）
quality_attributes:
  # 优先级排序（1-5，1 最高，无重复）
  priorities:
    performance: 1      # 性能 — 7×24 持续数据写入，性能要求高
    availability: 2     # 可用性 — 7×24 不能宕
    cost: 3             # 成本 — 海量时序数据压缩很重要，降低存储成本
    maintainability: 4  # 可维护性 — 远程维护边缘节点、配置下发是难点
    consistency: 5      # 一致性 — 允许一定时间窗口内的数据丢失，最终一致即可

  # 量化目标（必填）
  # 由 design 主导补充数字指标（latency/throughput/SLA），define 校验
  targets:
    consistency_model: "eventual"
    latency_p99: "仪表盘查询 < 2s；告警评估端到端 < 30s"
    throughput: "单边节点 5 万点/秒；云端聚合 500 万点/秒（最大客户）"
    availability_sla: "云端 99.95%；边端尽力而为（单机部署，无 HA SLA 承诺）"

# 领域特定约束（可选，可扩展）
# 记录场景级差异化（如边云协同模式、多租户模型、部署层级特征等）
# 写入本块的信息必须是产品定位级，不是实现细节
domain_specific:
  edge_cloud_topology:
    architectural_support: "N 层任意嵌套（设备 → 边 → 区域汇聚 → 云，递归嵌套）"
    typical_deployment: "2 层（边-云），90% 以上场景"
    edge_form: "单机部署，不考虑边端 HA 集群"
    edge_node_count_per_customer: "100 以内（典型 10+）"
    edge_device_per_node: "约 100 台设备 × 10 测点 ≈ 1000 测点/边节点"
    edge_data_frequency: "亚秒 ~ 秒级"

  data_loss_tolerance:
    window: "30 秒"
    rationale: "时序数据特征——允许节点故障时丢失 30 秒未刷盘数据，换取写入吞吐与可用性"
    implication: "写入路径无需 fsync per-write；WAL 与副本协议设计可放宽强同步要求"

  iot_protocol_compatibility:
    responsibility: "由数据库兼容主流工业采集协议（MQTT/CoAP/Modbus/OPC-UA 等待第 2-3 阶段研究确认范围）"
    note: "设备工程师不直接关心数据库；协议适配是数据库产品的责任"

