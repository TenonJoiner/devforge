name: spec-driven-enhanced
version: 1
description: DevForge 增强版工作流 — proposal → specs → design → tasks（TDD 粒度 + 代码级 skill 集成）

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Research existing specs before filling this in.
      Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.

      This is the foundation - specs, design, and tasks all build on this.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: TDD 粒度的可执行任务清单
    template: tasks.md
    instruction: |
      将 specs 和 design 分解为可执行的任务清单。

      ## 任务推导

      任务清单的**主要输入是 specs**，design 辅助提供实现路径和顺序。
      OpenSpec 两层结构：`##` = 任务组（对应一条 Requirement 或 QA 闸口），
      `- [ ]` = 任务（apply phase 跟踪的最小单元）。
      本工作流将每个 Scenario 映射为一个完整的 TDD 任务（RED → GREEN → REFACTOR），
      并在每个 Requirement 任务组末尾追加 LINT 和 REVIEW 任务，
      所有 Requirement 任务组之后追加一个 QA 任务组作为 feature 级闸口。

      ### 从 specs 推导任务

      - **Requirement → 任务组**：每条 Requirement 对应一个任务组（`## N. <Requirement 名称>`）
      - **Scenario → 一个 TDD 任务**：每个 Scenario（正常路径或异常路径）对应一个 checkbox，
        一次 `/df:tdd` 调用完成完整的 RED → GREEN → REFACTOR 循环
      - **Scenario 粒度原则**：每个 Scenario 只描述一个具体的、可验证的行为。一次 `/df:tdd` 调用
        应在几分钟到十几分钟内完成。如果某个 Scenario 的实现需要多轮 RED-GREEN-REFACTOR
        才能覆盖，说明该 Scenario 定义过粗，应在 specs 层面拆分为多个更细的 Scenario
      - **异常 Scenario 独立成任务**：异常路径不合并到正常路径任务中，独立列出避免遗漏
      - **追溯标注**：每个任务描述末尾标注对应的 Requirement/Scenario 标识，便于核对覆盖

      ### 从 design 获取实现路径

      design 不定义任务边界，但告知每个 GREEN 任务**在哪里实现、按什么顺序实现**：
      - design 的模块分层和接口定义 → 确定 GREEN 任务的目标文件和函数签名
      - design 的模块依赖关系 → 确定任务的执行顺序（被依赖的模块先实现）
      - design 的 Interface Changes → 接口定义先于实现任务执行
      - 基础设施（公共类型、工具函数、配置）→ 被多个 Requirement 依赖，优先编排

      ### 任务组编排

      - 按 Requirement 分组（每个 ## 组对应一条 Requirement）
      - 同一 Requirement 横跨多个模块时，按模块拆分子组（如 ## 1a. Requirement X - storage 侧）
      - 禁止按 TDD 步骤类型做分组（如「## RED 阶段」）

      ### 任务组末尾固定任务（强制）

      每个 Requirement 任务组的末尾必须追加：
      - **LINT 任务**：调用 `/df:lint autofix` 进行静态检查并自动修复
      - **REVIEW 任务**：调用 `/df:code-review autofix` 进行代码评审并按 CRITICAL → HIGH 顺序自动修复

      ### 末尾 QA 任务组（强制）

      所有 Requirement 任务组之后，必须追加一个独立的 QA 任务组作为 feature 级闸口：

      ```
      ## QA. 质量保障
      - [ ] QA.1 FULL-LINT: 调用 /df:lint autofix 全量检查（编译 + 静态分析），修复所有 error/warning
      - [ ] QA.2 FULL-REVIEW: 调用 /df:code-review autofix 全量评审并修复 CRITICAL/HIGH
      - [ ] QA.3 DEEP-REFACTOR: 调用 /df:simplify 深度简化重构
      - [ ] QA.4 UNIT-COVERAGE: 重新执行单元测试，验收覆盖率达标
      - [ ] QA.5 INTEGRATION-TEST: 开发 feature 级别集成测试用例，运行并验证通过
      ```

      QA 任务组与所有 Requirement 任务组都是 depends-on 关系（最后执行）。

      ## 格式要求（IMPORTANT：apply phase 依赖此格式跟踪进度）

      - 任务组使用 `## N. <Requirement 名称>` 或 `## QA. 质量保障` 标题
      - 每个任务必须是 checkbox：`- [ ] N.M <类型>: <描述>`
      - 任务类型枚举：
        - Requirement 任务组内：SCENARIO / LINT / REVIEW / CHORE / INTEGRATION-TEST
        - QA 任务组内：FULL-LINT / FULL-REVIEW / DEEP-REFACTOR / INTEGRATION-TEST / UNIT-COVERAGE
      - 未使用 `- [ ]` 的任务不会被 apply phase 跟踪
      - 按依赖顺序排列（先做的排前面）
      - 每个任务必须可验证——完成时能明确判断"做完了"
      - 禁止模糊描述（如"实现数据处理"、"写测试"）

      ### SCENARIO 任务必填内容

      任务描述中必须包含：测试文件路径、测试函数名、源文件路径、函数签名、关键逻辑。

      ### CHORE 任务

      纯配置变更、文档更新、构建脚本等无需测试的任务，类型标注为 CHORE，并说明为什么不需要测试。

      ## Mock 纪律

      - **先真实后 mock**：写测试时先用真实实现运行，确认测试对真实代码失败后，才在正确层级添加最小 mock
      - **只 mock 慢/不可控的部分**：优先使用轻量级真实替代（内存数据库、临时文件）
      - **不测试 mock 行为**：断言必须针对被测系统的真实行为
      - **完整 mock**：mock 的数据结构必须完整镜像真实 API 的全部字段
      - **Mock 太复杂时重构**：如果 mock 设置占测试 >50%，应重构解耦

      ## Parallel

      并行调度的粒度是**任务组**（`## N.`），不是单个任务：
      - 同一任务组内的任务严格串行
      - 不同 Requirement 任务组之间根据模块依赖标记 independent 或 depends-on
      - QA 任务组永远 depends-on 所有 Requirement 任务组

      ## 反模式检查
      - 🚩 任务描述无具体文件路径和函数名
      - 🚩 Scenario 任务未写明测试文件路径、测试函数名、源文件路径和函数签名
      - 🚩 Requirement 任务组末尾缺少 LINT 和 REVIEW 任务
      - 🚩 缺少末尾 QA 任务组
      - 🚩 specs 中的某个 Requirement/Scenario 在 tasks 中没有对应任务
      - 🚩 按 TDD 类型做分组而非按 Requirement 分组
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    读取前序 artifact（proposal.md、specs/*.md、design.md）了解需求和设计方案。

    ## 调度模型

    - 任务组（`## N.` 组）粒度调度：independent 任务组可并行，depends-on 按依赖顺序串行
    - 任务组内任务（`- [ ]`）严格串行执行
    - QA 任务组（`## QA.`）depends-on 所有 Requirement 任务组，最后执行
    - 完成每个任务后立即标记 checkbox

    ## 任务类型 → 执行者映射

    主会话只负责调度，不直接编写代码或评审。每种任务类型由对应的 agent + skill 执行：

    | 任务类型 | 执行者 | 调用方式 |
    |---------|--------|---------|
    | SCENARIO | developer agent | `/df:tdd` skill（RED → GREEN → REFACTOR） |
    | CHORE | developer agent | 直接处理，无 skill |
    | LINT | code-reviewer agent → developer agent | `/df:lint autofix` 检查 → developer 修复 |
    | REVIEW | code-reviewer agent → developer agent | `/df:code-review autofix` 评审 → developer 修复 |
    | DEEP-REFACTOR | developer agent | `/df:simplify` skill |
    | FULL-REVIEW | code-reviewer agent → developer agent | `/df:code-review autofix` 全量评审 → developer 修复 |
    | FULL-LINT | code-reviewer agent → developer agent | `/df:lint autofix` → developer 修复 |
    | UNIT-COVERAGE | developer agent | 运行测试套件，验收覆盖率达标 |
    | INTEGRATION-TEST | developer agent | feature 级别集成测试编写与验证 |

    ## Commit 策略

    - **粒度**：每个 Requirement 任务组完成后整理为一个正式 commit
    - **格式**：Conventional Commits，Refs 字段关联 proposal 和任务组编号

    ## 阻塞处理

    遇到以下情况暂停并向用户报告：
    - developer 执行失败且无法自动恢复
    - LINT/REVIEW 反复评出 CRITICAL/HIGH 问题（≥ 3 轮仍未通过）
    - 任务描述与 specs/design 出现矛盾
    - 任务超出预期粒度（如 GREEN 任务实现超过 200 行）
