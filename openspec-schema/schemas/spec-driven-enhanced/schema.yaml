name: spec-driven-enhanced
version: 1
description: DevForge 增强版工作流 — proposal → specs → design → tasks（TDD 粒度 + 代码级 skill 集成）

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      创建 proposal 文档，明确本次变更的 WHY。

      ## 需求澄清（创建前 SHOULD 执行）

      在编写 proposal 之前，综合以下信息来源判断是否有模糊或缺失的关键信息：
      - 用户的需求描述
      - 已有产品级文档（如存在）中的相关上下文
      如果有，通过 1-3 个针对性问题澄清（方法：一次只问一个，选择题优先）。
      思考方向：变更目的是否清晰？影响范围是否明确？是否有未说明的约束或依赖？
      如果用户的需求描述已足够清晰完整，跳过提问直接编写。

      按模板章节顺序填写：

      **Why**：
      - 1-2 段叙事，说明问题或机会，建立共情
      - bugfix / 性能优化 / 技术债务清理时：分析根因，量化影响（如性能下降百分比、故障频率）
      - 新特性 / 能力扩展时：说明业务价值、用户场景、不做的后果

      **What Changes**：
      - 变更清单，具体说明新增、修改或移除的能力
      - 破坏性变更标记 **BREAKING**

      **Capabilities**：
      - OpenSpec 流程的规范入口，识别将要创建或修改的 spec

        **核心原则**：每个 Capability 都是**对外部调用方/用户可见的行为能力或质量属性承诺**，不是内部实现动作（如新增内部 API、修改某文件、换数据结构、升级依赖版本）。即使以子系统仓库为单位执行 OpenSpec，Capability 也应该是该子系统对外暴露的能力或质量属性。

        **命名规范**：
        - 从**功能特性维度**命名，不从模块或组件维度命名。
        - 使用**共享前缀**让相关能力在 `specs/` 中字典序聚集（如 `replication-*`、`storage-*`）。
        - 两段或三段，按需选择：
          - 两段：`{feature}-{capability}` — 如 `replication-log-shipping`、`storage-compaction`
          - 三段：`{feature}-{area}-{capability}` — 如 `replication-consensus-leader-election`、`storage-io-latency`
        - 技术名不推荐（保证命名稳定性），但不禁止。
        - 禁止斜杠、`and`、`or` 连接多个概念。
        - 禁止组件类名作为 capability 名。

        **粒度判断 — 拆还是合，基于以下维度**：
        - 功能完整性：是否描述了完整、可独立理解的功能边界？
        - 开发独立性：是否可以相对独立地开发、测试、验收？
        - 依赖耦合：强依赖其他 capability → 考虑合并；松耦合 → 可拆分。
        - 演进稳定性：总是一起变 → 合并；独立演进 → 拆分。

        - **New Capabilities**：新增能力列表。每个 capability 生成 `specs/<capability-name>/spec.md`。
        - **Modified Capabilities**：已有能力的行为变更或质量属性提升。仅当存在外部可见变化时列出，不只因内部实现调整而列出。每个需要一份 delta spec。使用 `openspec/specs/` 中的已有名称。无需求变更则留空。
        - 实现动作（如升级依赖、重构模块、替换数据结构）不作为 New/Modified Capability；由实现动作带来的外部可见行为或质量属性变化可以且应该列为 capability。

      - **Acceptance Criteria**：从外部视角定义本次变更做成什么样算成功。只写**feature 级别**的整体验收标准（如端到端场景、性能基线、兼容性承诺、覆盖率门槛），不重复 Capabilities 中的单个能力描述。单个 capability 的详细验收在对应 spec.md 的 Scenario 中细化。

      - **Impact**：受影响的代码、API、依赖和系统。

      重要：Capabilities 部分是 proposal 与 specs 之间的契约。填写前先研究已有 specs，避免重复或遗漏。每个 capability 都需要一份对应的 spec 文件。

      保持简洁（1-2 页）。聚焦"为什么"而非"怎么做"——实现细节属于 design.md。

      **篇幅控制**：Capabilities 中禁止展开实现方案、文件路径、API 签名、内部数据结构等技术细节；Impact 只列出受影响的高层范围，不做展开。避免在 Why / What Changes / Capabilities / Impact 之间重复描述同一变更。

      proposal 是整个流程的基石，specs、design、tasks 都建立在此基础上。

      ## 反模式检查
      - 🚩 Why 只说"需要这个功能"而没有解释为什么需要
      - 🚩 Capability 描述的是实现方案（如"使用 B+ 树索引"）而非行为（如"支持范围查询"）
      - 🚩 Capability 描述的是内部实现动作（如"新增 `xx_internal_api()`""修改 `foo.c`"）而非外部可见行为
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      创建规范文件，定义系统应该做什么（WHAT）。

      按 proposal 的 Capabilities 部分，每个 capability 一份 spec 文件：
      - New capabilities：使用 proposal 中的 kebab-case 名称（`specs/<capability>/spec.md`）。
      - Modified capabilities：使用 `openspec/specs/<capability>/` 中的已有名称创建 delta spec（`specs/<capability>/spec.md`）。

      文档结构（按模板章节顺序）：

      **Requirements Overview**：
      - 1-2 段，说明本 spec 基于 proposal 中哪个 capability 展开
      - 分解为哪些需求方向及理由，让读者快速理解"这份 spec 管什么"

      **Delta 操作（使用 ## 标题）**：
      - **ADDED Requirements**：新增能力
      - **MODIFIED Requirements**：行为变更——必须包含完整更新内容
      - **REMOVED Requirements**：废弃功能——必须包含 **Reason** 和 **Migration**
      - **RENAMED Requirements**：仅改名——使用 FROM:/TO: 格式

      **Non-Functional Requirements**：
      - 位于 Delta 操作之后，强制覆盖以下五类；不涉及的必须写明「本期不涉及：[具体原因]」
      - **Performance**：延迟、吞吐量、资源占用、伸缩性等量化指标
      - **Reliability**：容错、故障恢复、持久化保证、可用性目标
      - **Compatibility**：与现有版本、协议、API、数据格式、客户端的兼容性要求
      - **Observability**：监控指标、日志、追踪、告警等可观测信号
      - **Upgrade Compatibility**：版本升级、回滚、数据/配置迁移的要求
      - 所有指标必须可验证、可度量，并引用其在 ADDED/MODIFIED Requirements 中的落地位置

      格式要求：
      - 每条 Requirement：`### Requirement: <name>` + 描述
      - 使用 SHALL/MUST 表达规范性要求（避免 should/may）
      - 每条 Scenario：`#### Scenario: <name>` + WHEN/THEN
      - **关键**：Scenario 必须使用 4 个 hashtag（`####`），3 个或 bullet 会静默失败
      - 每条 Requirement 至少一个 Scenario

      MODIFIED requirements 工作流：
      1. 在 `openspec/specs/<capability>/spec.md` 中定位已有 Requirement
      2. 复制整个 Requirement block（从 `### Requirement:` 到所有 Scenario）
      3. 粘贴到 `## MODIFIED Requirements` 下并修改
      4. 确保 header 文本精确匹配（不区分空白）

      常见陷阱：MODIFIED 只写部分内容会导致 archive 时丢失细节。
      如果是新增关注点而非改变已有行为，用 ADDED 而非 MODIFIED。

      **细节边界**：Scenario 应包含足够可测试的外部行为细节（输入、输出、状态变化、异常），但禁止描述内部实现方式、数据结构、调用链路或具体函数名。spec 只写 WHAT，不写 HOW。内部重构应表述为"在保持外部行为 X 不变的前提下，指标 Y 达到 Z"，而非实现步骤。

      Spec 应该可测试——每条 Scenario 都是潜在的测试用例。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      创建设计文档，说明如何实现（HOW）。

      何时需要 design.md（满足任一条件时创建）：
      - 跨模块变更（多个服务/模块）或新架构模式
      - 新外部依赖或重大数据模型变更
      - 安全、性能或迁移复杂度
      - 技术决策有助于消除歧义时

      各章节（按模板章节顺序）：
      - **Context**：背景、现状、约束、利益相关方
      - **Goals / Non-Goals**：本设计达成什么、明确排除什么
      - **Solution Overview**：3-5 段整体方案概括、核心思路、关键组件、最终交付的系统行为变化
      - **Architecture**：只画与本特性相关的子系统/模块
        - **Component Architecture**：ASCII Art 或 Mermaid 图，新增/修改模块明确标注
        - **Component Description**：2-3 段叙述各组件职责、边界、数据流向
      - **Key Flows**：1-3 个最关键流程，用时序图展示触发条件、关键决策点、异常分支、性能考量
      - **Decisions**：关键技术选择及理由（为什么选 X 而非 Y？），每个决策列出备选方案
      - **Interface Changes**：涉及跨子系统接口时列出变更类型、函数签名/数据结构/协议格式
      - **Risks / Trade-offs**：已知风险和权衡。格式：[风险] → [缓解措施]
      - **Upgrade Impact**：升级影响声明，评估本特性对系统升级流程的影响及升级模块需做的工作
      - **Open Questions**：待解决的决策或未知项

      聚焦架构和方案，而非逐行实现。
      禁止大段复制粘贴 spec 内容；需要引用 spec 时以"参见 specs/<capability>/spec.md Requirement X"形式简要关联，将篇幅留给方案本身。
      参考 proposal 了解动机，参考 specs 了解需求。

      好的设计文档解释技术决策背后的"为什么"。
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: TDD 粒度的可执行任务清单
    template: tasks.md
    instruction: |
      将 specs 和 design 分解为可执行的任务清单。

      ## 任务推导

      任务清单的**主要输入是 specs**，design 辅助提供实现路径和顺序。
      OpenSpec 两层结构：`##` = 任务组（对应一条 Requirement 或 QA 闸口），
      `- [ ]` = 任务（apply phase 跟踪的最小单元）。
      本工作流将每个 Scenario 映射为一个完整的 TDD 任务（RED → GREEN → REFACTOR），
      并在每个 Requirement 任务组末尾追加 LINT 和 REVIEW 任务，
      所有 Requirement 任务组之后追加一个 QA 任务组作为 feature 级闸口。

      ### 从 specs 推导任务

      - **Requirement → 任务组**：每条 Requirement 对应一个任务组（`## N. <Requirement 名称>`）
      - **Scenario → 一个 TDD 任务**：每个 Scenario（正常路径或异常路径）对应一个 checkbox，
        一次 `/df:tdd` 调用完成完整的 RED → GREEN → REFACTOR 循环
      - **Scenario 粒度原则**：每个 Scenario 只描述一个具体的、可验证的行为。一次 `/df:tdd` 调用
        应在几分钟到十几分钟内完成。如果某个 Scenario 的实现需要多轮 RED-GREEN-REFACTOR
        才能覆盖，说明该 Scenario 定义过粗，应在 specs 层面拆分为多个更细的 Scenario
      - **异常 Scenario 独立成任务**：异常路径不合并到正常路径任务中，独立列出避免遗漏
      - **追溯标注**：每个任务描述末尾标注对应的 Requirement/Scenario 标识，便于核对覆盖

      ### 从 design 获取实现路径

      design 不定义任务边界，但告知每个 GREEN 任务**在哪里实现、按什么顺序实现**：
      - design 的模块分层和接口定义 → 确定 GREEN 任务的目标文件和函数签名
      - design 的模块依赖关系 → 确定任务的执行顺序（被依赖的模块先实现）
      - design 的 Interface Changes → 接口定义先于实现任务执行
      - 基础设施（公共类型、工具函数、配置）→ 被多个 Requirement 依赖，优先编排

      ### 任务组编排

      - 按 Requirement 分组（每个 ## 组对应一条 Requirement）
      - 同一 Requirement 横跨多个模块时，按模块拆分子组（如 ## 1a. Requirement X - storage 侧）
      - 禁止按 TDD 步骤类型做分组（如「## RED 阶段」）

      ### 任务组末尾固定任务（强制）

      每个 Requirement 任务组的末尾必须追加：
      - **LINT 任务**：调用 `/df:lint autofix` 进行静态检查并自动修复
      - **REVIEW 任务**：调用 `/df:code-review autofix` 进行代码评审并按 CRITICAL → HIGH 顺序自动修复

      ### 末尾 QA 任务组（强制）

      所有 Requirement 任务组之后，必须追加一个独立的 QA 任务组作为 feature 级闸口：

      ```
      ## QA. 质量保障
      - [ ] QA.1 FULL-LINT: 调用 /df:lint autofix 全量检查（编译 + 静态分析），修复所有 error/warning
      - [ ] QA.2 FULL-REVIEW: 调用 /df:code-review autofix 全量评审并修复 CRITICAL/HIGH
      - [ ] QA.3 DEEP-REFACTOR: 调用 /df:simplify 深度简化重构
      - [ ] QA.4 UNIT-COVERAGE: 重新执行单元测试，验收覆盖率达标
      - [ ] QA.5 INTEGRATION-TEST: 开发 feature 级别集成测试用例，运行并验证通过
      ```

      QA 任务组与所有 Requirement 任务组都是 depends-on 关系（最后执行）。

      ## 格式要求（IMPORTANT：apply phase 依赖此格式跟踪进度）

      - 任务组使用 `## N. <Requirement 名称>` 或 `## QA. 质量保障` 标题
      - 每个任务必须是 checkbox：`- [ ] N.M <类型>: <描述>`
      - 任务类型枚举：
        - Requirement 任务组内：SCENARIO / LINT / REVIEW / CHORE / INTEGRATION-TEST
        - QA 任务组内：FULL-LINT / FULL-REVIEW / DEEP-REFACTOR / INTEGRATION-TEST / UNIT-COVERAGE
      - 未使用 `- [ ]` 的任务不会被 apply phase 跟踪
      - 按依赖顺序排列（先做的排前面）
      - 每个任务必须可验证——完成时能明确判断"做完了"
      - 禁止模糊描述（如"实现数据处理"、"写测试"）

      ### SCENARIO 任务必填内容

      任务描述中必须包含：测试文件路径、测试函数名、源文件路径、函数签名、关键逻辑。

      ### CHORE 任务

      纯配置变更、文档更新、构建脚本等无需测试的任务，类型标注为 CHORE，并说明为什么不需要测试。

      ## Mock 纪律

      - **先真实后 mock**：写测试时先用真实实现运行，确认测试对真实代码失败后，才在正确层级添加最小 mock
      - **只 mock 慢/不可控的部分**：优先使用轻量级真实替代（内存数据库、临时文件）
      - **不测试 mock 行为**：断言必须针对被测系统的真实行为
      - **完整 mock**：mock 的数据结构必须完整镜像真实 API 的全部字段
      - **Mock 太复杂时重构**：如果 mock 设置占测试 >50%，应重构解耦

      ## Parallel

      并行调度的粒度是**任务组**（`## N.`），不是单个任务：
      - 同一任务组内的任务严格串行
      - 不同 Requirement 任务组之间根据模块依赖标记 independent 或 depends-on
      - QA 任务组永远 depends-on 所有 Requirement 任务组

      ## 反模式检查
      - 🚩 任务描述无具体文件路径和函数名
      - 🚩 Scenario 任务未写明测试文件路径、测试函数名、源文件路径和函数签名
      - 🚩 Requirement 任务组末尾缺少 LINT 和 REVIEW 任务
      - 🚩 缺少末尾 QA 任务组
      - 🚩 specs 中的某个 Requirement/Scenario 在 tasks 中没有对应任务
      - 🚩 按 TDD 类型做分组而非按 Requirement 分组
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    读取前序 artifact（proposal.md、specs/*.md、design.md）了解需求和设计方案。

    ## 调度模型

    - 任务组（`## N.` 组）粒度调度：independent 任务组可并行，depends-on 按依赖顺序串行
    - 任务组内任务（`- [ ]`）严格串行执行
    - QA 任务组（`## QA.`）depends-on 所有 Requirement 任务组，最后执行
    - 完成每个任务后立即标记 checkbox

    ## 任务类型 → 执行者映射

    主会话只负责调度，不直接编写代码或评审。每种任务类型由对应的 agent + skill 执行：

    | 任务类型 | 执行者 | 调用方式 |
    |---------|--------|---------|
    | SCENARIO | developer agent | `/df:tdd` skill（RED → GREEN → REFACTOR） |
    | CHORE | developer agent | 直接处理，无 skill |
    | LINT | developer agent | `/df:lint autofix` 编译+静态分析 → developer 修复 |
    | REVIEW | code-reviewer agent → developer agent | `/df:code-review autofix` 评审 → developer 修复 |
    | DEEP-REFACTOR | developer agent + code-reviewer subagents | `/df:simplify` skill（三维度并行评审 → developer 汇总修复） |
    | FULL-REVIEW | code-reviewer agent → developer agent | `/df:code-review autofix` 全量评审 → developer 修复 |
    | FULL-LINT | developer agent | `/df:lint autofix` 全量编译+静态分析 → developer 修复 |
    | UNIT-COVERAGE | developer agent | 运行测试套件，验收覆盖率达标 |
    | INTEGRATION-TEST | developer agent | feature 级别集成测试编写与验证 |

    ## Commit 策略

    - **粒度**：每个 Requirement 任务组完成后整理为一个正式 commit
    - **格式**：Conventional Commits，Refs 字段关联 proposal 和任务组编号

    ## 阻塞处理

    遇到以下情况暂停并向用户报告：
    - developer 执行失败且无法自动恢复
    - LINT/REVIEW 反复评出 CRITICAL/HIGH 问题（≥ 3 轮仍未通过）
    - 任务描述与 specs/design 出现矛盾
    - 任务超出预期粒度（如 GREEN 任务实现超过 200 行）
