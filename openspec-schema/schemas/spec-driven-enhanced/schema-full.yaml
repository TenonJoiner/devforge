name: spec-driven-enhanced
version: 1
description: 增强版规范驱动工作流 — 新增评审环节 + TDD 粒度任务分解

artifacts:
  - id: proposal
    generates: proposal.md
    description: 变更提案文档，确立动机和范围
    template: proposal.md
    instruction: |
      创建 proposal 文档，确立本次变更的动机和范围。

      ## 产品级文档输入参考（创建前 MUST 执行）

      在动笔之前，按以下步骤查找相关产品级文档，将找到的内容补充到上下文后再进行需求澄清和写作：

      1. **查阅迭代计划**（`docs/iteration-plan/`）：在对应 milestone 或迭代计划中查找本 proposal
         对应的任务条目，获取任务描述、优先级和里程碑约束。
      2. **按变更性质补充背景**（二选一）：
         - **外部需求驱动**（用户可见的功能/特性）：在 `docs/requirements/` 中查找对应 Feature
           的详细描述和验收标准，作为 Capabilities 拆解的输入依据。
         - **基础架构/重构驱动**（非外部需求的技术改进）：在 `docs/architecture/` 中查找对应
           子系统或模块的设计文档，了解架构约束和设计意图。
      3. 查找不到相关文档时，在 Product Traceability 中填写"不适用"并说明原因，不阻塞流程。

      ## 需求澄清（创建前 SHOULD 执行）

      在编写 proposal 之前，综合以下信息来源判断是否有模糊或缺失的关键信息：
      - 用户的需求描述
      - 「产品级文档输入参考」步骤中找到的相关文档内容
      如果有，通过 1-3 个针对性问题澄清（方法：一次只问一个，选择题优先）。
      思考方向：变更目的是否清晰？影响范围是否明确？是否有未说明的约束或依赖？
      如果用户的需求描述已足够清晰完整，跳过提问直接编写。

      ## 各部分要求（按模板章节顺序）

      **Why**：
      - 1-2 句话说明问题或机会。分析根因，而非描述表面现象
      - 量化影响：用数据说明严重程度（如性能下降百分比、故障频率）
      - 如果无法量化，说明定性影响和不解决的后果

      **Product Traceability**（记录上述查找结果）：
      - 列出步骤 1-2 中实际找到的文档及其与本次变更的关联
      - 有对应文档时：`docs/iteration-plan/<文件>#<条目>` + 需求或架构文档引用
      - 无对应文档时：填写"不适用"并说明原因

      **What Changes**：
      - 变更清单，具体说明新增、修改或移除的能力
      - 破坏性变更标记 **BREAKING**

      **Capabilities**（关键：这是 proposal 与 specs 之间的契约）：

      **命名规范**：
      - 从**功能特性维度**命名，不从模块或组件维度命名
      - 使用**共享前缀**让相关能力在 `specs/` 中聚集（如 `replication-*`、`storage-*`）
      - 两段或三段，按需选择：
        - 两段：`{feature}-{capability}` — 如 `replication-log-shipping`、`storage-compaction`
        - 三段：`{feature}-{area}-{capability}` — 如 `replication-consensus-leader-election`
      - 技术名不推荐（保证命名稳定性），但不禁止
      - 禁止斜杠、`and`、`or` 连接多个概念
      - 禁止组件类名作为 capability 名

      **粒度判断 — 拆还是合，基于以下维度**：
      - 功能完整性：是否描述了完整、可独立理解的功能边界？
      - 开发独立性：是否可以相对独立地开发、测试、验收？
      - 依赖耦合：强依赖其他 capability → 考虑合并；松耦合 → 可拆分
      - 演进稳定性：总是一起变 → 合并；独立演进 → 拆分

      - **New Capabilities**：新增能力列表。每个 Capability 生成 `specs/<capability-name>/spec.md`
      - **Modified Capabilities**：已有能力的行为变更（非纯实现优化）。
        使用 `openspec/specs/` 中的已有 spec 名称。无需求变更则留空
      - 填写前先研究已有 specs，避免重复或遗漏
      - 每个 Capability 必须描述可验证的行为变化，而非实现细节

      **Impact**：列出受影响的代码、API、依赖和系统。

      保持简洁（1-2 页）。聚焦"为什么"而非"怎么做"——实现细节属于 design.md。
      proposal 是整个流程的基石，specs、design、tasks 都建立在此基础上。

      ## 反模式检查
      - 🚩 Why 只说"需要这个功能"而没有解释为什么需要
      - 🚩 Capability 描述的是实现方案（如"使用 B+ 树索引"）而非行为（如"支持范围查询"）
      - 🚩 Product Traceability 留空（应填写关联文档或"不适用 + 原因"）
    requires: []

  - id: research
    generates: research.md
    description: 特性级研究文档——约束清单、标杆方案空间、设计空间地图
    template: research.md
    instruction: |
      生成 research.md：用 Skill 工具调用 `devforge-feature-research` skill 完成。

      **调用方式**：
      - 默认模式：`devforge-feature-research`（2 个必须确认点：标杆产品 + 带债推进决策）
      - 全确认模式：`devforge-feature-research --confirm-topics --confirm-constraints`（4 个确认点）

      **确认环节**：
      - **必须确认**（默认启用）：
        - 标杆产品确认：标杆识别后，确认 3-5 个标杆是否合适
        - 带债推进确认：3 轮评审仍未通过时，决定是否接受带债推进
      - **可选确认**（需参数启用）：
        - 技术关注点确认（`--confirm-topics`）：提取技术关注点后，确认是否覆盖核心问题
        - 产品约束确认（`--confirm-constraints`）：收集产品约束后，确认是否完整

      research.md 是 spec 与 design 的共同输入：
      - 产品约束：本特性必须遵守的架构、协议、性能、范围约束（来自产品级文档与本 proposal）
      - 标杆方案空间：按技术关注点组织的标杆方案研究（不按产品维度并列）
      - 设计空间地图：标杆 × 约束过滤后的可行候选空间

      跑完 skill 后，research.md 落到 `openspec/changes/<change-name>/research.md`。
      若 research.md 已存在，skill 会反问「修订 / 补全」并按指定模式运行。

      详细流程见 `.claude/skills/devforge-feature-research/SKILL.md`。
    requires: [proposal]

  - id: specs
    generates: "specs/**/*.md"
    description: 规范文件，定义系统行为的 Delta 变更
    template: spec.md
    instruction: |
      生成 specs/*.md：用 Skill 工具调用 `devforge-feature-define` skill 完成。

      spec 描述系统应该做什么（WHAT），不涉及如何实现（HOW）。
      按 proposal 的 Capabilities 拆解，每个 Capability 一个 spec 文件。
      使用 Delta 格式（ADDED / MODIFIED / REMOVED / RENAMED）—— archive 引擎依赖这套语义。

      skill 会读取 proposal.md、research.md（约束清单 + 设计空间）、design.md（如已存在）
      和产品级 requirements，派遣 product agent 生成、product-reviewer + architect-reviewer
      双视角评审。spec.md 已存在时，skill 反问「修订 / 补全」。

      详细流程见 `.claude/skills/devforge-feature-define/SKILL.md`。

      ## OpenSpec 模板硬约束（不可破坏）

      - Delta 章节名必须精确匹配：`## ADDED Requirements` / `## MODIFIED Requirements` /
        `## REMOVED Requirements` / `## RENAMED Requirements`
      - Requirement 用 `### Requirement: <name>`，Scenario 用 `#### Scenario: <name>`
      - **CRITICAL**：Scenario 必须 4 个 hashtag（####），3 个或 bullet 会静默失败
      - 每条 Requirement 至少一个 Scenario
      - MODIFIED 必须复制完整 Requirement block，不能只写差异部分

      ## 旧版输入参考（保留供 fallback）

      若 skill 调用失败，按以下输入手工生成。下方「## 文件组织」「## Delta 规范格式」
      「## Requirement 格式」「## 质量要求」「## 反模式检查」是手工生成时的具体规则。

      1. **proposal.md**：proposal 的 Capabilities 定义了 spec 的边界和范围——本 spec
         只覆盖对应 Capability 描述的行为，不超出、不遗漏
      2. **research.md**：约束清单 + 设计空间地图，作为 Requirement 边界依据
      3. **docs/requirements/**：查找本 Capability 对应的产品级需求文档，提取该 Feature
         的详细描述、验收标准和场景，作为 Requirement 和 Scenario 的编写依据
      4. 查找不到对应产品级需求文档时，在 Requirement 的追溯字段中填写"不适用"并说明
         原因，不阻塞流程

      ## 文件组织

      按 proposal 的 Capabilities 部分，每个 Capability 一个 spec 文件：
      - New capabilities：使用 proposal 中的 kebab-case 名称（specs/<capability>/spec.md）
      - Modified capabilities：使用 openspec/specs/<capability>/ 中的已有名称

      ## Delta 规范格式（使用 ## headers）

      - **ADDED Requirements**：新增能力
      - **MODIFIED Requirements**：行为变更——MUST 包含完整更新内容
      - **REMOVED Requirements**：废弃功能——MUST 包含 **Reason** 和 **Migration**
      - **RENAMED Requirements**：仅改名——使用 FROM:/TO: 格式

      MODIFIED 工作流：
      1. 在 openspec/specs/<capability>/spec.md 中定位已有 Requirement
      2. 复制 ENTIRE requirement block（从 `### Requirement:` 到所有 Scenario）
      3. 粘贴到 `## MODIFIED Requirements` 下并修改
      4. 确保 header 文本精确匹配（不区分空白）
      常见陷阱：MODIFIED 只写部分内容会导致 archive 时丢失细节。
      如果是新增关注点而非改变已有行为，用 ADDED 而非 MODIFIED。

      ## Requirement 格式

      - 每条：`### Requirement: <name>` + 描述
      - 使用 SHALL/MUST 表达规范性要求（禁止 should/may/可以/建议）
      - 每条 Scenario：`#### Scenario: <name>` + WHEN/THEN
      - **CRITICAL**：Scenario 必须使用 4 个 hashtag（`####`），3 个 hashtag 或 bullet 会静默失败
      - 每条 Requirement 至少一个 Scenario
      - 每条 Requirement 必须填写追溯字段：有对应产品级需求时关联 docs/requirements/ 下的具体条目，无对应需求时（如 bugfix、重构、技术债务清理）填写"不适用"并说明原因

      ## 质量要求

      **Requirement 编写**：
      - 必须可测试：读完能明确判断"通过"还是"不通过"
      - 一条 Requirement 只描述一个行为。用"和"连接了两个行为则拆成两条
      - 描述可观测的外部行为，不涉及内部实现

      **Scenario 编写**：
      - 每条 Requirement 至少一个正常路径 + 一个异常路径 Scenario
      - WHEN 描述具体的前置状态和触发动作（如"当并发连接数超过 1000"而非"当系统负载较高"）
      - THEN 描述可验证的预期结果（如"返回错误码 ENOMEM"而非"返回错误"）
      - 异常路径应聚焦业务语义层面，从需求本身的业务逻辑出发思考可能的失败场景和预期反馈（如权限不足、配额超限、前置条件不满足、冲突等），而非罗列通用的系统级异常（内存/网络/并发等实现细节留给 design 阶段处理）

      ## 反模式检查
      - 🚩 Requirement 使用了"应该"/"建议"等非强制性词汇
      - 🚩 Requirement 描述了实现方式而非行为
      - 🚩 Scenario 只有正常路径，没有异常路径
      - 🚩 THEN 的预期结果不可判断（如"系统正常工作"）
      - 🚩 追溯字段为空（应填写关联需求或"不适用 + 原因"）
    requires: [proposal, research]

  - id: design
    generates: design.md
    description: 技术设计文档，说明如何实现
    template: design.md
    instruction: |
      生成 design.md：用 Skill 工具调用 `devforge-feature-design` skill 完成。

      design 描述如何（HOW）实现 specs 中定义的需求。
      skill 注入「特性级在既有架构内展开，不新建子系统」语境，派遣 architect agent 生成、
      architect-reviewer 评审。强制图示触发条件（结构图 / 时序图 / 状态机图 / 数据流图）。

      skill 会读取 proposal.md、research.md（约束 + 标杆 + 设计空间）、spec.md（如已存在）
      与产品级 architecture/ADR。design.md 已存在时，skill 反问「修订 / 补全」。

      详细流程见 `.claude/skills/devforge-feature-design/SKILL.md`。

      ## 旧版输入参考（保留供 fallback）

      若 skill 调用失败，按以下输入手工生成。下方「## 各部分要求」「## 质量要求」
      「## 反模式检查」是手工生成时的具体规则。

      1. **proposal.md**：了解变更动机和范围
      2. **research.md**：约束清单、标杆方案、设计空间地图——为 Decision 提供候选与过滤依据
      3. **specs/*.md**（如已生成）：了解行为规范的详细定义，设计方案应与之对齐
      4. **docs/architecture/**：查找相关子系统的架构设计文档，了解架构约束、已有决策和
         模块边界，确保本设计方案与产品级架构一致
      5. **docs/requirements/**：查找相关 Feature 的产品级需求，了解更广泛的业务上下文
         和非功能性约束（性能指标、可用性要求等）
      6. 查找不到对应文档时，在 Architecture Traceability 中填写"不适用"并说明原因，
         不阻塞流程

      ## 各部分要求（按模板章节顺序）

      - **Context**：背景、现状、约束、利益相关方
      - **Architecture Traceability**：关联 docs/architecture/ 下的具体文档，紧随 Context 说明架构约束
      - **Goals / Non-Goals**：本设计要达成什么、明确排除什么
      - **Decisions**：关键技术选择及理由（为什么选 X 而非 Y？），每个决策列出备选方案
      - **Interface Changes**：涉及跨子系统接口时列出变更定义及影响，紧随 Decisions 说明方案的对外接口
      - **Risks / Trade-offs**：已知风险和权衡。格式：[风险] → [缓解措施]
      - **Migration Plan**：部署步骤、回滚策略（如适用）
      - **Open Questions**：待解决的决策或未知项，放在末尾作为待决事项汇总

      聚焦架构和方案，而非逐行实现。

      ## 质量要求

      **Decisions（核心）**：
      - 已被产品级架构约束确定的决策，直接引用架构文档，无需列备选
      - 有实质性选择空间的决策，列出备选方案并逐项比较 trade-off
      - 比较维度至少包含：复杂度、性能影响、可维护性、与现有代码的一致性
      - 明确写出"选择 X 因为 Y"，而非只列出方案不给结论
      - 决策应聚焦架构层面的方案选择（如数据结构/算法选型、一致性模型、模块交互方式、性能与可靠性权衡等），而非语言级编码细节（内存管理、锁实现等留给代码级阶段处理）
      - 量化优先：性能对比使用具体数值（如 ~5μs vs ~30μs），而非"低/中/高"；
        空间开销使用具体公式（如"1M 请求 × 200B/条 ≈ 200MB 内存"）
      - 涉及并发或多节点交互的决策，MUST 声明并发模型：
        互斥锁/读写锁/无锁/乐观并发、锁粒度和获取顺序、关键路径的 happens-before 关系
      - 涉及多状态组件时，MUST 用状态转换表替代纯文字描述：
        | 当前状态 | 事件 | 下一状态 | 动作 |

      **Interface Changes**：
      - 涉及跨子系统接口时，列出变更的函数签名、数据结构、协议格式
      - 标注兼容性：向前兼容 / 向后兼容 / 破坏性变更

      **Risks / Trade-offs**：
      - 每个 Risk 必须有对应的 Mitigation，不能只列风险不给方案

      **Architecture Traceability**：
      - 有对应架构文档时关联 docs/architecture/ 下的具体文件，无对应文档时（如新领域、局部优化等）填写"不适用"并说明原因
      - 设计方案不得与产品级架构决策矛盾，如有偏差须显式标注并说明原因

      ## 反模式检查
      - 🚩 有选择空间的决策只列了一个方案没有备选（已被架构约束的除外）
      - 🚩 Decisions 没有 trade-off 分析，只说"使用 X"
      - 🚩 Risk 没有 Mitigation
      - 🚩 Architecture Traceability 为空（应填写关联文档或"不适用 + 原因"）
    requires: [proposal, research]

  - id: review
    generates: review.md
    description: 设计评审报告——单轮全维度扫描 + 人工决策门禁
    template: review.md
    instruction: |
      生成 review.md：用 Skill 工具调用 `devforge-spec-review` skill 完成。

      review.md 包含两部分：
      1. **AI 评审报告**：单轮扫描，输出问题清单（按 CRITICAL/HIGH/MEDIUM/LOW 分级）+ AI 建议决策。**不做修复**
      2. **Tech Leader 最终决策**：留空，等人工填写

      详细流程见 `.claude/skills/devforge-spec-review/SKILL.md`。

      ## 与 skill 内化评审的关系

      feature-research / feature-define / feature-design 三个 skill 内部已经做过深度
      评审循环（最多 3 轮自修），保证基础质量。本 review artifact 是「质量体检 + 人工
      门槛」：单轮扫描 21 项维度，发现问题不修复，输出清单交人决策。

      若发现 CRITICAL 问题，AI 建议给 REJECT，由主人决定是直接对话改 artifact、
      重跑对应 skill 修订模式、或在人工决策时说明问题不成立。

      ## 缺陷密度计分规则

      每个问题按严重级别计分：
      - **CRITICAL**（10 分）：阻塞性问题——需求遗漏、设计与 spec 矛盾、安全漏洞
      - **HIGH**（3 分）：重要问题——Scenario 不完整、Decision 缺少备选方案、追溯链断裂
      - **MEDIUM**（1 分）：改进建议——命名不清晰、描述可更精确
      - **LOW**（0.1 分）：风格建议——格式、措辞

      AI 建议门槛（仅供参考，最终决策权在 Tech Leader）：
      - 所有文档缺陷总分 ≤ 2.0 → 建议 PASS
      - 仅有 MEDIUM/LOW 累积超标，无 CRITICAL/HIGH → 建议 PASS WITH CONDITIONS
      - 任一文档有 CRITICAL，或多文档总分严重超标 → 建议 REJECT

      ## 评审标准（21 项）

      以下为评审的单一权威标准。skill 内化评审与本 artifact 评审都以此为准。

      **跨文档一致性**：
      - proposal/specs/design 三者是否一致——Capability、Requirement、Decision 之间无矛盾
      - 与产品级文档（docs/requirements/、docs/architecture/）是否一致
      - 追溯链完整：产品级需求 → proposal Capability → specs Requirement → design Decision

      **Proposal 质量（3 项）**：
      - **动机合理性**：Why 是否清晰说明了问题或机会，有根因分析而非表面描述；问题是否值得解决（业务价值、影响范围）
      - **方案合理性**：提出的 Capabilities 是否是解决该问题的合理方案，有无更优替代方案未考虑
      - **范围完整性**：Capabilities 是否完整覆盖变更范围，粒度是否合理

      **Specs 质量（7 项）**：
      - **需求合理性**：每条 Requirement 本身是否合理——不过度（镀金）、不遗漏（关键场景缺失）、不矛盾（需求间冲突）
      - **需求必要性**：每条 Requirement 是否必要——能否追溯到 proposal 的 Capability 或产品级需求，无凭空增加的需求
      - **需求完整性**：Requirement 集合是否完整覆盖问题域——不只是"支撑 proposal"，而是从领域视角审视是否有遗漏
      - **需求清晰性**：每条 Requirement 是否清晰无歧义——读完能明确判断"通过"还是"不通过"
      - **需求可验收性**：每条 Requirement 是否可独立验收——不依赖其他 Requirement 的上下文就能理解和测试
      - **异常路径质量**：每条 Requirement 的异常路径 Scenario 是否从业务语义出发（如权限、配额、冲突等）
      - **安全覆盖**：安全相关的行为是否有对应 Requirement 覆盖

      **Design 质量（11 项）**：
      - **方案可行性**：技术方案是否可行——能否满足 specs 的每条 Requirement，有无技术风险未评估
      - **方案竞争力**：方案是否具备竞争力——对比业界标准或已知方案，在性能、可扩展性、成本等关键维度是否有说服力
      - **方案合理性**：技术决策是否合理——trade-off 权衡是否得当（不只是列出备选，而是选择合理）
      - **架构一致性**：是否违反架构设计原则——对照 docs/architecture/ 检查，如有偏差须显式说明原因
      - **设计内部一致性**：设计内部是否一致——Decision 之间无矛盾，接口定义与实现方案匹配
      - **可维护性**：设计复杂度是否合理，是否过度工程化，是否便于后续演进
      - **故障处理**：故障场景是否充分考虑——关键路径的失败模式、降级策略、恢复机制
      - **决策备选方案**：有选择空间的决策是否有备选方案和 trade-off 分析
      - **并发模型**：涉及并发交互的决策是否声明了并发模型（锁类型、粒度、获取顺序）
      - **状态机表达**：涉及多状态组件是否有状态转换表
      - **性能评估**：性能影响评估是否充分——关键路径延迟和吞吐量是否有量化分析

      ## 单轮扫描流程

      1. **并行评审**：启动两个独立 agent 并行评审，各自按评审标准中对应维度检查：
         - **product-reviewer agent**：跨文档一致性（产品视角）+ Proposal 质量（3 项）+ Specs 质量（7 项）
         - **architect-reviewer agent**：跨文档一致性（架构视角）+ Design 质量（11 项）
         两个 agent 独立工作，互不可见对方的评审结果
      2. **汇总计分**：主会话收集两个 agent 的评审结果，合并问题清单，去重后分别计算
         proposal.md、specs/ 中每个 spec 文件、design.md 的缺陷总分
      3. **写入 review.md**：问题清单 + 缺陷总分 + AI 建议决策。**不做修复**
      4. **STOP**：提示用户由 Tech Leader 在「人工评审决策」区域填写最终决策

      ## 人工评审门禁（强制）

      - AI 完成评审报告和 AI 建议后，MUST 将 review.md 的「人工评审决策」区域留空，然后 **STOP**
      - 提示用户：review.md 已生成，请组织交叉评审并由 tech leader 在「人工评审决策」区域填写最终决策
      - **只有人工决策为 PASS 或 PASS WITH CONDITIONS 时，才允许进入 tasks 阶段**
      - 人工决策为 REJECT 时，根据评审反馈修改文档（直接对话改 / 重跑 skill 修订模式），
        然后删除 review.md 执行 `/opsx:continue` 重新触发评审
      - 禁止跳过人工评审直接生成 tasks——即使 AI 评估为 PASS，「人工评审决策」区域未填写的 review 视为未完成

      ## 手动调用

      除 OpenSpec workflow 自动触发外，主人可在任意时刻直接调用 `/df:spec-review`
      做临时体检（例如对话散改后的引用断裂检查）。两种调用方式共享同一 skill 实现。
    requires: [specs, design]

  - id: tasks
    generates: tasks.md
    description: TDD 粒度的可执行任务清单
    template: tasks.md
    instruction: |
      将 specs 和 design 分解为可执行的任务清单。

      ## 前置检查（MUST）

      创建 tasks 前 MUST 读取 review.md，检查「Tech Leader 最终决策」区域：
      - 决策为 PASS 或 PASS WITH CONDITIONS → 允许继续创建 tasks
      - 决策为 REJECT 或决策区域为空/未填写 → **禁止创建 tasks**，提示：「review.md 中 Tech Leader 最终决策未填写或为 REJECT，请先完成交叉评审并由 Tech Leader 确认后再继续」

      ## 任务推导

      任务清单的**主要输入是 specs**，design 辅助提供实现路径和顺序。
      OpenSpec 两层结构：`##` = 任务组（对应一条 Requirement 或 QA 闸口），
      `- [ ]` = 任务（apply phase 跟踪的最小单元）。
      本工作流将每个 Scenario 映射为一个完整的 TDD 任务（RED → GREEN → REFACTOR），
      并在每个 Requirement 任务组末尾追加 LINT 和 REVIEW 任务，
      所有 Requirement 任务组之后追加一个 QA 任务组作为 feature 级闸口。

      ### 从 specs 推导任务

      - **Requirement → 任务组**：每条 Requirement 对应一个任务组（`## N. <Requirement 名称>`）
      - **Scenario → 一个 TDD 任务**：每个 Scenario（正常路径或异常路径）对应一个 checkbox，
        一次 `/df:tdd` 调用完成完整的 RED → GREEN → REFACTOR 循环
        （TDD 步骤的具体写法见下方「TDD 任务格式」）
      - **Scenario 粒度原则**：每个 Scenario 只描述一个具体的、可验证的行为。一次 `/df:tdd` 调用
        应在几分钟到十几分钟内完成。如果某个 Scenario 的实现需要多轮 RED-GREEN-REFACTOR
        才能覆盖，说明该 Scenario 定义过粗，应在 specs 层面拆分为多个更细的 Scenario
      - **异常 Scenario 独立成任务**：异常路径不合并到正常路径任务中，独立列出避免遗漏
      - **追溯标注**：每个任务描述末尾标注对应的 Requirement/Scenario 标识，便于核对覆盖

      ### 从 design 获取实现路径

      design 不定义任务边界，但告知每个 GREEN 任务**在哪里实现、按什么顺序实现**：
      - design 的模块分层和接口定义 → 确定 GREEN 任务的目标文件和函数签名
      - design 的模块依赖关系 → 确定任务的执行顺序（被依赖的模块先实现）
      - design 的 Interface Changes → 接口定义先于实现任务执行
      - 基础设施（公共类型、工具函数、配置）→ 被多个 Requirement 依赖，优先编排

      ### 任务组编排

      - 按 Requirement 分组（每个 ## 组对应一条 Requirement）
      - 同一 Requirement 横跨多个模块时，按模块拆分子组（如 ## 1a. Requirement X - storage 侧）
      - 禁止按 TDD 步骤类型做分组（如「## RED 阶段」）

      ### 任务组末尾固定任务（强制）

      每个 Requirement 任务组的末尾必须追加：
      - **LINT 任务**：调用 `/df:lint autofix` 进行静态检查并自动修复
      - **REVIEW 任务**：调用 `/df:code-review autofix` 进行代码评审并按 CRITICAL → HIGH 顺序自动修复

      末尾任务的位置在所有 Scenario 任务之后，是该 Requirement 完成的质量闸口。

      ### 末尾 QA 任务组（强制）

      所有 Requirement 任务组之后，必须追加一个独立的 QA 任务组作为 feature 级闸口：

      ```
      ## QA. 质量保障
      - [ ] QA.1 FULL-LINT: 调用 /df:lint autofix 全量检查（编译 + 静态分析），修复所有 error/warning
      - [ ] QA.2 FULL-REVIEW: 调用 /df:code-review autofix 全量评审并修复 CRITICAL/HIGH
      - [ ] QA.3 DEEP-REFACTOR: 调用 /df:simplify 深度简化重构
      - [ ] QA.4 UNIT-COVERAGE: 重新执行单元测试，验收覆盖率达标
      - [ ] QA.5 INTEGRATION-TEST: 开发 feature 级别集成测试用例，运行并验证通过
      ```

      QA 任务组与所有 Requirement 任务组都是 depends-on 关系（最后执行）。

      ## 格式要求（IMPORTANT：apply phase 依赖此格式跟踪进度）

      - 任务组使用 `## N. <Requirement 名称>` 或 `## QA. 质量保障` 标题
      - 每个任务必须是 checkbox：`- [ ] N.M <类型>: <描述>`
      - 任务类型枚举：
        - Requirement 任务组内：SCENARIO / LINT / REVIEW / CHORE / INTEGRATION-TEST
        - QA 任务组内：FULL-LINT / FULL-REVIEW / DEEP-REFACTOR / INTEGRATION-TEST / UNIT-COVERAGE
      - 未使用 `- [ ]` 的任务不会被 apply phase 跟踪
      - 按依赖顺序排列（先做的排前面）
      - 每个任务必须可验证——完成时能明确判断"做完了"
      - 禁止模糊描述（如"实现数据处理"、"写测试"）

      ### SCENARIO 任务必填内容

      任务描述中必须包含：测试文件路径、测试函数名、源文件路径、函数签名、关键逻辑。

      ### CHORE 任务

      纯配置变更、文档更新、构建脚本等无需测试的任务，类型标注为 CHORE，并说明为什么不需要测试。

      ## Mock 纪律

      Mock 是隔离的工具，不是要测试的东西。遵循以下原则：

      - **先真实后 mock**：写测试时先用真实实现运行，确认测试对真实代码失败后，才在正确层级添加最小 mock
      - **只 mock 慢/不可控的部分**：优先使用轻量级真实替代（内存数据库、临时文件），只在确实不可控的外部边界使用 mock
      - **不测试 mock 行为**：断言必须针对被测系统的真实行为，不能针对 mock 是否被调用、mock 返回值等 mock 自身行为
      - **完整 mock**：mock 的数据结构必须完整镜像真实 API 的全部字段，不能只 mock 已知字段
      - **注释说明**：每个 mock 必须注释说明 mock 了什么、为什么必须 mock、mock 行为与真实行为的差异
      - **Mock 太复杂时重构**：如果 mock 设置占测试 >50%，说明被测模块耦合过紧，应重构解耦而非继续增加 mock 复杂度

      ## Parallel

      并行调度的粒度是**任务组**（`## N.`），不是单个任务：
      - 同一任务组内的任务严格串行（TDD 步骤天然有依赖、LINT/REVIEW 必须在实现完成后）
      - 不同 Requirement 任务组之间根据 Requirement 关系和模块依赖标记 independent 或 depends-on
      - QA 任务组永远 depends-on 所有 Requirement 任务组，最后执行

      任务组间依赖关系判定：
      - 任务组 N 与 M 无数据依赖、无模块调用链 → 标记 N 为 independent
      - 任务组 N 实现时需要任务组 M 提供的接口/数据结构 → 标记 N 为 depends-on:M
      - 共享同一基础设施模块 → 基础设施任务组优先编排，业务任务组 depends-on 它

      核心规则：基于 **Requirement 间关系和模块依赖**判断任务组的并行性，
      不在单任务粒度上标注并行属性。

      ## 反模式检查
      - 🚩 任务描述无具体文件路径和函数名（如"实现存储模块"）
      - 🚩 Scenario 任务未写明测试文件路径、测试函数名、源文件路径和函数签名
      - 🚩 Requirement 任务组末尾缺少 LINT 和 REVIEW 任务
      - 🚩 缺少末尾 QA 任务组
      - 🚩 所有任务组都标记为 depends-on 导致完全串行（应重新审视是否可以拆出独立任务组）
      - 🚩 specs 中的某个 Requirement/Scenario 在 tasks 中没有对应任务
      - 🚩 任务凭空编排，未追溯到 specs 中的 Requirement 或 Scenario
      - 🚩 按 TDD 类型做分组（如「## RED 阶段」「## GREEN 阶段」），而非按 Requirement 分组
      - 🚩 在单任务粒度标注 Parallel 属性，而非任务组粒度
    requires: [review]

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    读取前序 artifact（proposal.md、specs/*.md、design.md、review.md）了解需求和设计方案。

    ## 调度模型

    - 任务组（`## N.` 组）粒度调度：independent 任务组可并行，depends-on 按依赖顺序串行
    - 任务组内任务（`- [ ]`）严格串行执行
    - QA 任务组（`## QA.`）depends-on 所有 Requirement 任务组，最后执行
    - 完成每个任务后立即标记 checkbox

    ## 任务类型 → 执行者映射

    主会话只负责调度，不直接编写代码或评审。每种任务类型由对应的 agent + skill 执行：

    | 任务类型 | 执行者 | 调用方式 |
    |---------|--------|---------|
    | SCENARIO | developer agent | `/df:tdd` skill（RED → GREEN → REFACTOR） |
    | CHORE | developer agent | 直接处理，无 skill |
    | LINT | developer agent | `/df:lint autofix` 编译+静态分析 → developer 修复 |
    | REVIEW | code-reviewer agent → developer agent | `/df:code-review autofix` 评审 → developer 按 CRITICAL/HIGH 修复 |
    | DEEP-REFACTOR | developer agent + code-reviewer subagents | `/df:simplify` skill（三维度并行评审 → developer 汇总修复） |
    | FULL-REVIEW | code-reviewer agent → developer agent | `/df:code-review autofix` 全量评审 → developer 修复 |
    | FULL-LINT | developer agent | `/df:lint autofix` 全量编译+静态分析 → developer 修复 |
    | UNIT-COVERAGE | developer agent | 运行测试套件，验收覆盖率达标 |
    | INTEGRATION-TEST | developer agent | feature 级别基本集成测试编写与验证 |

    **任务类型判定规则**：
    - 任务描述包含 `RED → GREEN → REFACTOR` → SCENARIO 类型 → `/df:tdd`
    - 任务描述以 `LINT:` 开头 → LINT 类型
    - 任务描述以 `REVIEW:` 开头 → REVIEW 类型
    - 任务描述以 `CHORE:` 开头 → CHORE 类型
    - QA 任务组中的任务按对应前缀判定（`FULL-LINT:` / `FULL-REVIEW:` / `DEEP-REFACTOR:` 等）

    **Agent 职责约束**：
    - **developer agent**：只写不审。负责所有代码编写、测试编写、修复实现。
      根据 domain-config.yaml 自动适配语言和测试框架，严格执行 TDD 铁律
    - **code-reviewer agent**：只审不写。输出结构化分级评审意见
      （CRITICAL / HIGH / MEDIUM / LOW），不直接修改代码

    ## Commit 策略

    遵循 R2 `git-workflow` 的 Commit 规范：

    - **粒度**：每个 Requirement 任务组完成后整理为一个正式 commit
    - **格式**：Conventional Commits，Refs 字段关联 proposal 和任务组编号
    - **整理**：task 内部可自由 commit，task group 完成前 rebase 为单一 atomic commit

    详见 `.claude/rules/git-workflow.md` §Commit 粒度。

    ## 主会话职责

    主会话作为调度者，只做：
    1. 选取下一个待执行任务（按调度模型规则）
    2. 根据任务类型派发到对应的 agent
    3. 对于 LINT/REVIEW/FULL-LINT/FULL-REVIEW 类任务：
       - 先派 code-reviewer agent 输出评审/检查报告
       - 再派 developer agent 按报告修复 CRITICAL/HIGH 问题
       - 修复后重新评审，直到无 CRITICAL/HIGH 或达到重试上限
    4. 标记 checkbox、维护 tasks.md 进度

    ## 阻塞处理

    遇到以下情况暂停并向用户报告：
    - developer 执行失败且无法自动恢复
    - LINT/REVIEW 反复评出 CRITICAL/HIGH 问题（≥ 3 轮仍未通过）
    - 任务描述与 specs/design 出现矛盾
    - 发现需要 mock 内部模块才能写测试（说明耦合过紧，需先重构）
    - 任务超出预期粒度（如 GREEN 任务实现超过 200 行）
    - UNIT-COVERAGE 任务发现覆盖率不达标且短期无法补齐
